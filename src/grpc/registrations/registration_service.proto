syntax = "proto3";

option csharp_namespace = "ProjectService.Protos";

package registration;

service RegistrationService {
  rpc SignUp (SignUpRequest) returns (SignUpResponse);
  rpc CancelRegistration (CancelRegistrationRequest) returns (CancelRegistrationResponse);
  rpc GetMyEnrollments (GetMyEnrollmentsRequest) returns (GetMyEnrollmentsResponse);
}

message SignUpRequest {
  string project_id = 1;
  string volunteer_id = 2;
  string volunteer_full_name = 3;
  string volunteer_email = 4;
}

message SignUpResponse {
  string enrollment_id = 1;
  string message = 2;
}

message CancelRegistrationRequest {
  string project_id = 1;
  string volunteer_id = 2;
}

message CancelRegistrationResponse {
  string enrollment_status = 1;
  string message = 2;
}

message GetMyEnrollmentsRequest {
  string volunteer_id = 1;
}

message MyEnrollment {
  string project_id = 1;
  string project_title = 2;
  string location = 3;
  string start_date = 4;
  string project_status = 5;
  string enrollment_status = 6;
  string enrolled_at = 7;
}

message GetMyEnrollmentsResponse {
  repeated MyEnrollment enrollments = 1;
}